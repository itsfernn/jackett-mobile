services:
  jackett-mobile:
    image: itsfernn/jackett-mobile:latest
    container_name: jackett-mobile
    ports:
      - "9118:9118"
    environment:
      # Point this at your Jackett instance
      - JACKETT_URL=http://jackett:9117
      # Required: your Jackett API key
      - JACKETT_API_KEY=your_api_key_here
      # Indexer filter: "all", single tracker ID, comma-separated, tag:..., etc.
      - INDEXERS=all
      # Custom page title
      - APP_TITLE=Jackett Mobile
    restart: unless-stopped
